name: Linux build
on:
  push:
    branches:
      - '**'
  pull_request:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: python
          - language: java
            config: -old
            use_custom_image: true
          - language: java
            config: -new
            use_custom_image: true
          - language: csharp
          - language: r
          - language: scala
    container: ${{ matrix.use_custom_image && format('ghcr.io/{0}/quantlib-swig-devenv:{1}', github.repository_owner, matrix.language) || format('ghcr.io/lballabio/quantlib-swig-devenv:{0}', matrix.language) }}
    steps:
    - uses: actions/checkout@v6
    - name: Build
      run: |
        ./.ci/${{ matrix.language }}${{ matrix.config }}.build
    - name: Install
      run: |
        ./.ci/${{ matrix.language }}${{ matrix.config }}.install
    - name: Check
      run: |
        ./.ci/${{ matrix.language }}${{ matrix.config }}.check
